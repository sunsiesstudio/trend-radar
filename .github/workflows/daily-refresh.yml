name: Daily trend & signal refresh

# Runs every morning at 07:00 Spain time (05:00 UTC in summer CEST, 06:00 UTC in winter CET).
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: # allow manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh signal cache
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/refresh-signals"
